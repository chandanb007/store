<header class="invoice-header">
      <div class="company-info">
        <!-- Company Logo -->
        <div class="company-logo" style="margin-bottom: 14px; display: flex; align-items: center; gap: 8px;">
          <svg width="34" height="34" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="8" fill="#0f172a"/><path d="M16 8L23 16L16 24L9 16L16 8Z" fill="white"/><circle cx="16" cy="16" r="3" fill="#0f172a"/></svg><span style="font-size: 18px; font-weight: 800; letter-spacing: -0.03em; color: #0f172a;">ACME Corp</span>
        </div>
        <div class="company-name" style="display: none;">{{companyName}}</div>
        <div class="company-details">
          <span>{{companyAddress1}}, {{companyAddress2}}, {{companyCity}}, {{companyPostalCode}}</span>
          <span>GST Number: {{companyGstNumber}}</span>
          <span>Email: {{companyEmail}}</span>
          <span>Phone: {{companyPhone}}</span>
        </div>
      </div>

      <div class="invoice-meta">
        <div class="invoice-title">Tax Invoice</div>
        <div class="meta-list">
          <span class="meta-label">Invoice Number:</span>
          <span class="meta-value">{{invoiceNumber}}</span>
          
          <span class="meta-label">Date:</span>
          <span class="meta-value">{{date}}</span>
        
          <span class="meta-label">Payment Status:</span>
          <span class="meta-value">{{paymentStatus}}</span>
        </div>
        <!-- Barcode of Invoice ID -->
        <!-- <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
          <img src="https://quickchart.io/barcode?type=code128&value=INV-2026-001&width=150&height=40&includeText=true" alt="Barcode INV-2026-001" style="display: block; width: 150px; height: 40px;" />
        </div> -->
      </div>
    </header>
