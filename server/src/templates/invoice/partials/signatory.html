<div class="signatory-column">
        <div style="font-size: 11px; font-weight: bold; text-transform: uppercase; color: #444444; margin-bottom: 6px;">Notes & Terms</div>
        <p style="font-size: 11px; color: #555555; line-height: 1.4; max-width: 90%; margin-bottom: 15px;">
          {{companyNoteTerms}}
        </p>

        <!-- Authorized Signatory Pad -->
        <div class="sig-block">
          <div style="font-size: 12px; font-weight: bold; color: #000000;">{{companyName}}</div>
          <div class="sig-cursive">{{companyAuthSign}}</div>
          <div style="font-size: 10px; font-weight: bold; color: #555555; border-top: 1px solid #cccccc; padding-top: 4px; display: inline-block;">Authorized Signatory</div>
          
          <!-- Realistic Round Stamp -->
          <div class="sig-stamp">
            <div>
              <div style="font-size: 7px; border-bottom: 1px solid rgba(220,38,38,0.3); padding-bottom: 1px; margin-bottom: 1px;">GST SECURE</div>
              <div>{{companyName}}</div>
              <div style="font-size: 6px; color: rgba(220,38,38,0.4); margin-top: 1px;">VERIFIED</div>
            </div>
          </div>
        </div>
      </div>
