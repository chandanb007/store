      <div class="summary-column">
        <div style="border: 1px solid #000000; padding: 12px; background-color: #fcfcfc;">
          <div style="display: table; width: 100%; font-size: 11px; margin-bottom: 6px;">
            <div style="display: table-cell;">Total Gross Amount</div>
            <div style="display: table-cell; text-align: right; font-weight: 600;">Rs {{subTotal}}</div>
          </div>
          <div style="display: table; width: 100%; font-size: 11px; margin-bottom: 2px; color: #059669;">
            <div style="display: table-cell;">Total Trade Discount <small><i>{{couponApplied}}</i></small></div>
            <div style="display: table-cell; text-align: right; font-weight: 600;">- Rs {{discount}}</div>
          </div>
          <div style="display: table; width: 50%; font-size: 10px; margin-bottom: 6px; color: #059669;">
            <div style="display: table-cell;">{{couponDescription}}</div>
          </div>
          <div style="display: table; width: 100%; font-size: 11px; margin-bottom: 6px;">
            <div style="display: table-cell;">Shipping Charges</div>
            <div style="display: table-cell; text-align: right; font-weight: 600;">Rs {{shippingCharges}}</div>
          </div>
          <div style="display: table; width: 100%; font-size: 13px; font-weight: bold; margin-top: 10px; border-top: 2px solid #000000; padding-top: 8px;">
            <div style="display: table-cell; text-transform: uppercase;">Grand Total</div>
            <div style="display: table-cell; text-align: right; color: #000000;">Rs {{grandTotal}}</div>
          </div>
        </div>
      </div>
